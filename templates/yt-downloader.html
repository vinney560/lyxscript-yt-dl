<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyxScript • YT-Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06080d;
            --surface: #0d1117;
            --surface2: #161b22;
            --surface3: #21262d;
            --border: #30363d;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-glow: rgba(59,130,246,0.25);
            --success: #10b981;
            --danger: #ef4444;
            --text: #e6edf3;
            --text2: #8b949e;
            --text3: #6e7681;
            --radius: 14px;
            --radius-sm: 10px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59,130,246,0.06), transparent),
                radial-gradient(ellipse 50% 30% at 80% 80%, rgba(139,92,246,0.03), transparent);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: clamp(16px,3vw,32px);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        .container { width: 100%; max-width: 780px; display: flex; flex-direction: column; gap: 18px; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: clamp(18px,3vw,26px);
        }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 12px;
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px; color: #fff;
        }
        .logo h1 {
            font-size: clamp(1.2rem,2.5vw,1.5rem);
            font-weight: 700; letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo small {
            font-size: 0.72rem; color: var(--text2); font-weight: 400;
            display: block; -webkit-text-fill-color: var(--text2);
        }
        .badge {
            background: var(--surface3); border: 1px solid var(--border);
            border-radius: 50px; padding: 5px 12px; font-size: 0.78rem;
            color: var(--text2); display: flex; align-items: center; gap: 6px;
        }
        .badge .dot { width:6px; height:6px; background:var(--success); border-radius:50%; }
        .url-row { display:flex; gap:10px; }
        .input-wrap { flex:1; position:relative; }
        .input-wrap i {
            position:absolute; left:15px; top:50%; transform:translateY(-50%);
            color:var(--text3); font-size:0.95rem; pointer-events:none;
        }
        input[type="text"] {
            width:100%; background:var(--surface2); border:1px solid var(--border);
            border-radius:var(--radius); padding:14px 16px 14px 42px;
            color:var(--text); font-size:0.93rem; font-family:inherit;
            outline:none; transition:0.2s;
        }
        input[type="text"]:focus {
            border-color:var(--primary);
            box-shadow:0 0 0 3px var(--primary-glow);
        }
        input[type="text"]::placeholder { color:var(--text3); }
        .btn {
            padding:13px 24px; border-radius:var(--radius);
            border:1px solid transparent; font-weight:600; font-size:0.9rem;
            font-family:inherit; cursor:pointer; transition:0.2s;
            white-space:nowrap; display:inline-flex; align-items:center; gap:8px;
        }
        .btn:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-primary {
            background:var(--primary); color:#fff; border-color:var(--primary);
            box-shadow:0 4px 12px var(--primary-glow);
        }
        .btn-primary:hover:not(:disabled) {
            background:var(--primary-dark); transform:translateY(-1px);
            box-shadow:0 8px 20px var(--primary-glow);
        }
        .btn-dl {
            width:100%; justify-content:center; padding:15px;
            font-size:0.98rem; border-radius:var(--radius); margin-top:4px;
        }
        .preview { display:none; }
        .preview.show { display:block; }
        .media-row { display:flex; gap:16px; flex-wrap:wrap; }
        .thumb {
            width:170px; height:95px; border-radius:var(--radius-sm);
            object-fit:cover; background:var(--surface3); flex-shrink:0;
            border:1px solid var(--border);
        }
        .meta { flex:1; min-width:200px; }
        .meta h3 {
            font-size:1.05rem; font-weight:600; margin-bottom:4px;
            display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
        }
        .meta p { color:var(--text2); font-size:0.83rem; }
        .sec-label {
            font-size:0.78rem; font-weight:600; text-transform:uppercase;
            letter-spacing:0.05em; color:var(--text3); margin:18px 0 8px;
        }
        .fmt-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
            gap:8px;
        }
        .fmt-btn {
            background:var(--surface2); border:1px solid var(--border);
            border-radius:var(--radius-sm); padding:11px 10px;
            color:var(--text2); font-size:0.82rem; font-weight:500;
            cursor:pointer; transition:0.15s; text-align:left;
            font-family:inherit; word-break:break-word; line-height:1.3;
        }
        .fmt-btn:hover { border-color:var(--primary); color:var(--text); background:var(--surface3); }
        .fmt-btn.active {
            background:var(--primary); border-color:var(--primary);
            color:#fff; box-shadow:0 3px 12px var(--primary-glow);
        }
        .history { display:flex; flex-direction:column; gap:6px; }
        .hist-item {
            display:flex; align-items:center; justify-content:space-between;
            gap:10px; padding:11px 13px; background:var(--surface2);
            border:1px solid var(--border); border-radius:var(--radius-sm);
            font-size:0.83rem; transition:0.15s;
        }
        .hist-item:hover { border-color:var(--primary); background:var(--surface3); }
        .hist-info { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
        .hist-title { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; }
        .hist-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
        .dot-ok { background:var(--success); }
        .dot-err { background:var(--danger); }
        .hist-time { font-size:0.72rem; color:var(--text3); flex-shrink:0; }
        .icon-btn {
            background:none; border:none; color:var(--text3);
            cursor:pointer; padding:5px 7px; border-radius:7px;
            font-size:0.8rem; transition:0.15s;
        }
        .icon-btn:hover { color:var(--text); background:var(--surface3); }
        .empty { text-align:center; padding:28px; color:var(--text3); }
        .empty i { font-size:1.8rem; margin-bottom:6px; display:block; }
        .toast {
            position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
            background:var(--surface); border:1px solid var(--danger);
            color:var(--danger); padding:10px 22px; border-radius:50px;
            font-size:0.82rem; font-weight:500; z-index:100;
            opacity:0; pointer-events:none; transition:opacity 0.3s;
            box-shadow:0 8px 24px rgba(0,0,0,0.4);
        }
        .toast.show { opacity:1; }
        .spinner {
            width:17px; height:17px; border:2px solid rgba(255,255,255,0.3);
            border-top-color:#fff; border-radius:50%;
            animation:spin 0.7s linear infinite; display:inline-block;
        }
        @keyframes spin { to{transform:rotate(360deg);} }
        .downloading-hint {
            display:none; text-align:center; padding:14px; color:var(--primary);
            font-weight:500; font-size:0.88rem; gap:8px; align-items:center; justify-content:center;
        }
        .downloading-hint.show { display:flex; }
        @media (max-width:500px) {
            .url-row { flex-direction:column; }
            .btn { justify-content:center; }
            .thumb { width:100%; height:140px; }
            .media-row { flex-direction:column; }
            .fmt-grid { grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">⬇</div>
                <div><h1>LyxScript<small>YT-Downloader</small></h1></div>
            </div>
            <div class="badge"><span class="dot"></span> Online</div>
        </div>
    </div>
    <div class="card">
        <div class="url-row">
            <div class="input-wrap">
                <i class="fas fa-link"></i>
                <input type="text" id="urlInput" placeholder="Paste YouTube URL...">
            </div>
            <button id="fetchBtn" class="btn btn-primary" onclick="app.fetchInfo()">
                <i class="fas fa-search"></i> Fetch
            </button>
        </div>
    </div>
    <div id="previewBlock" class="card preview">
        <div class="media-row">
            <img id="thumb" class="thumb" src="" alt="">
            <div class="meta">
                <h3 id="videoTitle"></h3>
                <p id="videoMeta"></p>
            </div>
        </div>
        <div class="sec-label">📺 Video Quality</div>
        <div id="videoFormats" class="fmt-grid"></div>
        <div class="sec-label">🎧 Audio Quality</div>
        <div id="audioFormats" class="fmt-grid"></div>
        <button id="downloadBtn" class="btn btn-primary btn-dl" onclick="app.startDownload()">
            <i class="fas fa-download"></i> Download
        </button>
        <div id="downloadingHint" class="downloading-hint">
            <span class="spinner"></span> Downloading — check your browser downloads...
        </div>
    </div>
    <div class="card">
        <div class="sec-label" style="margin-top:0;">📋 Download History</div>
        <div id="historyList" class="history">
            <div class="empty"><i class="fas fa-inbox"></i>No downloads yet</div>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>
<script>
const app = {
    videoInfo: null,
    selectedFormat: null,
    init() {
        this.loadHistory();
        document.getElementById('urlInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') this.fetchInfo();
        });
    },
    async fetchInfo() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) return this.toast('Enter a URL');
        const btn = document.getElementById('fetchBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Fetching...';
        try {
            const res = await fetch('/api/info', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({url})
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error||'Failed');
            this.videoInfo = data;
            this.showPreview(data);
        } catch(e) { this.toast(e.message); }
        finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-search"></i> Fetch';
        }
    },
    showPreview(info) {
        document.getElementById('previewBlock').classList.add('show');
        document.getElementById('thumb').src = info.thumbnail||'';
        document.getElementById('videoTitle').textContent = info.title;
        const m = Math.floor(info.duration/60), s = info.duration%60;
        document.getElementById('videoMeta').textContent = `${info.uploader||'Unknown'} • ${m}:${String(s).padStart(2,'0')}`;
        const vg = document.getElementById('videoFormats');
        const ag = document.getElementById('audioFormats');
        vg.innerHTML = ''; ag.innerHTML = '';
        info.formats.forEach(f => {
            const b = document.createElement('button');
            b.className = 'fmt-btn';
            b.textContent = f.quality;
            b.onclick = () => this.selectFormat(f, b);
            (f.type==='video'?vg:ag).appendChild(b);
        });
        const first = document.querySelector('#videoFormats .fmt-btn') || document.querySelector('#audioFormats .fmt-btn');
        if (first) this.selectFormat(info.formats[0], first);
        document.getElementById('downloadingHint').classList.remove('show');
        const dBtn = document.getElementById('downloadBtn');
        dBtn.disabled = false;
        dBtn.innerHTML = '<i class="fas fa-download"></i> Download';
    },
    selectFormat(format, btn) {
        this.selectedFormat = format;
        document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
    },
    async startDownload() {
        if (!this.videoInfo || !this.selectedFormat) return this.toast('Select a format');
        const url = document.getElementById('urlInput').value.trim();
        const dBtn = document.getElementById('downloadBtn');
        dBtn.disabled = true;
        dBtn.innerHTML = '<span class="spinner"></span> Preparing...';
        try {
            const res = await fetch('/api/download', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({url,format_type:this.selectedFormat.type,format_id:this.selectedFormat.id,bitrate:this.selectedFormat.bitrate||'192',title:this.videoInfo.title})
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error||'Failed');
            this.addHistory(data.download_id, data.title||this.videoInfo.title, 'completed');
            document.getElementById('downloadingHint').classList.add('show');
            dBtn.innerHTML = '<i class="fas fa-check"></i> Started';
            window.location.href = `/api/download/${data.download_id}/file`;
            setTimeout(() => {
                document.getElementById('downloadingHint').classList.remove('show');
                dBtn.disabled = false;
                dBtn.innerHTML = '<i class="fas fa-download"></i> Download';
            }, 3000);
        } catch(e) {
            this.toast(e.message);
            dBtn.disabled = false;
            dBtn.innerHTML = '<i class="fas fa-download"></i> Download';
        }
    },
    addHistory(id, title, status) {
        const raw = localStorage.getItem('ytdl_history');
        const items = raw ? JSON.parse(raw) : [];
        items.unshift({id, title, status, time:Date.now()});
        localStorage.setItem('ytdl_history', JSON.stringify(items.slice(0,50)));
        this.renderHistory(items.slice(0,50));
    },
    loadHistory() {
        const raw = localStorage.getItem('ytdl_history');
        this.renderHistory(raw ? JSON.parse(raw) : []);
    },
    deleteHistory(id) {
        const raw = localStorage.getItem('ytdl_history');
        const items = raw ? JSON.parse(raw) : [];
        const filtered = items.filter(i => i.id !== id);
        localStorage.setItem('ytdl_history', JSON.stringify(filtered));
        this.renderHistory(filtered);
    },
    renderHistory(items) {
        const container = document.getElementById('historyList');
        if (!items.length) {
            container.innerHTML = '<div class="empty"><i class="fas fa-inbox"></i>No downloads yet</div>';
            return;
        }
        container.innerHTML = items.slice(0,25).map(i => {
            const d = new Date(i.time);
            const ts = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
            return `<div class="hist-item"><div class="hist-info"><span class="hist-dot ${i.status==='completed'?'dot-ok':'dot-err'}"></span><span class="hist-title" title="${i.title||''}">${i.title||'Untitled'}</span><span class="hist-time">${ts}</span></div><button class="icon-btn" onclick="event.stopPropagation();app.deleteHistory('${i.id}')" title="Remove"><i class="fas fa-times"></i></button></div>`;
        }).join('');
    },
    toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(this._tt);
        this._tt = setTimeout(() => t.classList.remove('show'), 3500);
    }
};
app.init();
</script>
</body>
</html>
